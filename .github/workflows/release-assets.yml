name: Release assets

on:
  push:
    tags:
      - "[0-9]*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run release:check:publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
      - run: npm run release:package
      - name: Prove reproducible package
        run: |
          sha256sum dist/*.zip > /tmp/first.sha256
          npm run release:package
          sha256sum --check /tmp/first.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: office-viewer-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="$TAG"
          cp node_modules/@aiden0z/pptx-renderer/LICENSE AIDEN-PPTX-RENDERER-LICENSE
          gh release view "$TAG" &>/dev/null || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" main.js manifest.json styles.css LICENSE NOTICE \
            AIDEN-PPTX-RENDERER-LICENSE \
            dist/office-viewer-"$VERSION".zip
