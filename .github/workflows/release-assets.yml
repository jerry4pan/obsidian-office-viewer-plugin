name: Release assets

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run release:check
        env:
          RELEASE_TAG: ${{ github.ref_name }}
      - run: npm run release:package
      - name: Prove reproducible package
        run: |
          sha256sum dist/*.zip > /tmp/first.sha256
          npm run release:package
          sha256sum --check /tmp/first.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: office-viewer-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error
