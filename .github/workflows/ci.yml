name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run release:check
      - run: npm run release:package

  installed:
    # Apple Silicon macos-latest clamps Electron content below 1024x800.
    # macos-15-intel reports a 1920x1080 virtual display that can host it.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ensure display fits fixed compatibility viewport
        run: |
          system_profiler SPDisplaysDataType || true
          RESOLUTION_SET="/Library/Application Support/VMware Tools/vmware-resolutionSet"
          if [ -x "$RESOLUTION_SET" ]; then
            sudo "$RESOLUTION_SET" 1920 1080
            sleep 3
            system_profiler SPDisplaysDataType || true
          fi
          python3 - <<'PY'
          import re
          import subprocess
          import sys
          output = subprocess.check_output(["system_profiler", "SPDisplaysDataType"], text=True)
          print(output)
          heights = [
              int(match.group(1))
              for match in re.finditer(
                  r"(?:Resolution|UI Looks like):\s*\d+\s*x\s*(\d+)",
                  output,
              )
          ]
          if not heights:
              print("::error::Could not parse display height from system_profiler", file=sys.stderr)
              sys.exit(1)
          if max(heights) < 800:
              print(
                  f"::error::Display height {max(heights)} is below the fixed 1024x800 viewport",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Display height OK: {max(heights)} >= 800")
          PY
      - run: npm run test:e2e
      - run: npm run test:compatibility
      - run: npm run test:performance:baseline
      - run: npm run test:release
