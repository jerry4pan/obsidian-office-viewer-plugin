name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run release:check
      - run: npm run release:package

  installed:
    # Apple Silicon macos-latest clamps Electron content below 1024x800 and has
    # no vmware-resolutionSet. macos-15-intel exposes 1920x1080, which hosts the
    # fixed viewport; font/antialias drift versus local Apple Silicon baselines
    # is absorbed by COMPATIBILITY_MAX_VISUAL_DIFF_RATIO below.
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ensure display fits fixed compatibility viewport
        run: |
          set -euo pipefail
          echo "arch=$(uname -m)"
          system_profiler SPDisplaysDataType
          RESOLUTION_SET="/Library/Application Support/VMware Tools/vmware-resolutionSet"
          if [ -x "$RESOLUTION_SET" ]; then
            sudo "$RESOLUTION_SET" 1920 1080
            sleep 3
            system_profiler SPDisplaysDataType
          fi
          python3 - <<'PY'
          import re
          import subprocess
          import sys
          output = subprocess.check_output(["system_profiler", "SPDisplaysDataType"], text=True)
          heights = [
              int(match.group(1))
              for match in re.finditer(
                  r"(?:Resolution|UI Looks like):\s*\d+\s*x\s*(\d+)",
                  output,
              )
          ]
          if not heights:
              print("::error::Could not parse display height from system_profiler", file=sys.stderr)
              sys.exit(1)
          if max(heights) < 800:
              print(
                  f"::error::Display height {max(heights)} is below the fixed 1024x800 viewport",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Display height OK: {max(heights)} >= 800")
          PY
      - run: npm run test:e2e
      - run: npm run test:compatibility
        env:
          # Local Apple Silicon baselines differ slightly on Intel GH runners
          # (missing-font glyphs + edge antialias). Observed peak was ~0.313%.
          COMPATIBILITY_MAX_VISUAL_DIFF_RATIO: "0.005"
      - run: npm run test:performance:baseline
      - run: npm run test:release
      - name: Upload compatibility artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-artifacts
          path: artifacts/compatibility/
          if-no-files-found: ignore
